<section class="contact-wrapper">
  <h2>Контакты</h2>
  <hr>
  <div class="card-list">
    <div class="contact-card" *ngFor="let contact of contacts">
      <div class="card-icon-title">
        <img src="{{contact.icon}}" alt="">
        <h3>{{contact.title}}</h3>
      </div>
      <div class="description">{{contact.description}}</div>
      <div class="card-footer">
        <a href="{{contact.link}}" class="button-link">{{contact.buttonLabel}}</a>
      </div>
    </div>
  </div>
</section>
